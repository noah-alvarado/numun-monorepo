AWSTemplateFormatVersion: "2010-09-09"
Description: >
  NUMUN — one-time bootstrap stack.

  Provisions the GitHub Actions OIDC identity provider, five per-workflow
  deploy roles (api, site, portal, cms, infra), and the shared SAM artifacts
  bucket used by `sam deploy`. Deployed once from a workstation via the
  break-glass IAM user; subsequent deploys flow through GitHub Actions via
  the roles created here.

  Region: us-east-2.
  Reference: SECURITY.md §3.2, INFRASTRUCTURE.md §3.10.

Parameters:
  Env:
    Type: String
    AllowedPattern: "^[a-z][a-z0-9-]*$"
    Description: >
      Environment qualifier baked into every named resource — `test` for
      this staging account, `prod` in a future real-prod account.
  GitHubOrg:
    Type: String
    Description: GitHub organization or user that owns the NUMUN monorepo.
  GitHubRepo:
    Type: String
    Description: Repository name within GitHubOrg (e.g., "numun-vClaude").
  GitHubEnvironment:
    Type: String
    Default: test
    Description: Only allow deploys initiated from this GitHub Actions environment.

Resources:
  # ── GitHub Actions OIDC provider ────────────────────────────────────────────
  # AWS hosts a static trust for token.actions.githubusercontent.com; the
  # thumbprint is required by IAM but verified internally regardless of value.
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  # ── Shared SAM artifacts bucket ─────────────────────────────────────────────
  # Holds packaged Lambda zips uploaded by `sam deploy`. Objects expire after
  # 30 days to keep storage cost negligible.
  SamArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "numun-${Env}-sam-deploys-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-deploys
            Status: Enabled
            ExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ── Trust policy fragment (re-used by every deploy role) ────────────────────
  # Constrains the OIDC subject to <org>/<repo> on the named branch only — a
  # fork's workflow cannot assume these roles even if it knows the role ARN.
  # See SECURITY.md §3.2.

  DeployRoleApi:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "numun-${Env}-deploy-api"
      Description: GitHub Actions OIDC role for the /api SAM deploy workflow.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": sts.amazonaws.com
              StringLike:
                "token.actions.githubusercontent.com:sub": !Sub "repo:${GitHubOrg}/${GitHubRepo}:environment:${GitHubEnvironment}"
      Policies:
        - PolicyName: api-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudFormation operations on the api stack only.
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:DescribeStackResource
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListStacks
                  - cloudformation:ListStackResources
                  - cloudformation:ValidateTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                Resource:
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/numun-${Env}-api/*"
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/numun-${Env}-api*/*"
              - Effect: Allow
                Action:
                  - cloudformation:ValidateTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                Resource:
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:aws:transform/Serverless-2016-10-31"
              # Lambda code/config updates (scoped by name).
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:TagResource
                  - lambda:UntagResource
                  - lambda:ListVersionsByFunction
                  - lambda:PublishVersion
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:GetPolicy
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:numun-${Env}-*"
              # PassRole limited to roles created by the api stack.
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/numun-${Env}-api-*"
              # IAM ops on stack-managed roles (CFN creates these per deploy).
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/numun-${Env}-api-*"
              # API Gateway HTTP API + custom domain.
              - Effect: Allow
                Action:
                  - apigateway:*
                Resource:
                  - !Sub "arn:aws:apigateway:${AWS::Region}::*"
              # CloudWatch log groups for the Lambda function.
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:PutRetentionPolicy
                  - logs:TagResource
                  - logs:UntagResource
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/numun-${Env}-*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/numun-${Env}-*:*"
              # CloudWatch alarms managed by the api stack (Lambda error rate, etc.).
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:TagResource
                  - cloudwatch:UntagResource
                  - cloudwatch:ListTagsForResource
                Resource:
                  - !Sub "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:numun-${Env}-*"
              # SAM artifacts bucket.
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::numun-${Env}-sam-deploys-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::numun-${Env}-sam-deploys-${AWS::AccountId}/*"
              # SSM parameter reads at build time (env stamping etc).
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/numun/${Env}/*"

  DeployRoleSite:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "numun-${Env}-deploy-site"
      Description: GitHub Actions OIDC role for the /site landing-page deploy workflow.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": sts.amazonaws.com
              StringLike:
                "token.actions.githubusercontent.com:sub": !Sub "repo:${GitHubOrg}/${GitHubRepo}:environment:${GitHubEnvironment}"
      Policies:
        - PolicyName: site-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::numun-${Env}-site"
                  - !Sub "arn:aws:s3:::numun-${Env}-site/*"
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetDistribution
                  - cloudfront:ListDistributions
                Resource: "*"

  DeployRolePortal:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "numun-${Env}-deploy-portal"
      Description: GitHub Actions OIDC role for the /portal SPA deploy workflow.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": sts.amazonaws.com
              StringLike:
                "token.actions.githubusercontent.com:sub": !Sub "repo:${GitHubOrg}/${GitHubRepo}:environment:${GitHubEnvironment}"
      Policies:
        - PolicyName: portal-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::numun-${Env}-portal"
                  - !Sub "arn:aws:s3:::numun-${Env}-portal/*"
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetDistribution
                  - cloudfront:ListDistributions
                Resource: "*"

  DeployRoleCms:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "numun-${Env}-deploy-cms"
      Description: GitHub Actions OIDC role for the /cms admin-bundle deploy workflow.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": sts.amazonaws.com
              StringLike:
                "token.actions.githubusercontent.com:sub": !Sub "repo:${GitHubOrg}/${GitHubRepo}:environment:${GitHubEnvironment}"
      Policies:
        - PolicyName: cms-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::numun-${Env}-cms"
                  - !Sub "arn:aws:s3:::numun-${Env}-cms/*"
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetDistribution
                  - cloudfront:ListDistributions
                Resource: "*"

  # ── Infra role: deploys base-data + base-cdn (us-east-2) and the
  # ── billing-alarm stack (us-east-1). Broader perms than the per-app
  # ── roles because these stacks touch DynamoDB, Cognito, CloudFront,
  # ── Route53, SSM, SNS, and CloudWatch — all scoped by name prefix.
  DeployRoleInfra:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "numun-${Env}-deploy-infra"
      Description: GitHub Actions OIDC role for the base-data, base-cdn, and billing-alarm stacks.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": sts.amazonaws.com
              StringLike:
                "token.actions.githubusercontent.com:sub": !Sub "repo:${GitHubOrg}/${GitHubRepo}:environment:${GitHubEnvironment}"
      Policies:
        - PolicyName: infra-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudFormation operations on the three infra stacks (any region).
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:DescribeStackResource
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListStacks
                  - cloudformation:ListStackResources
                  - cloudformation:ValidateTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                Resource:
                  - !Sub "arn:aws:cloudformation:*:${AWS::AccountId}:stack/numun-${Env}-base-data/*"
                  - !Sub "arn:aws:cloudformation:*:${AWS::AccountId}:stack/numun-${Env}-base-cdn/*"
                  - !Sub "arn:aws:cloudformation:*:${AWS::AccountId}:stack/numun-${Env}-billing-alarm/*"
              # S3 buckets created/managed by base-data (DDB exports use the
              # numun-${Env}-* prefix; OAC bucket policies are on the same).
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:PutBucketVersioning
                  - s3:GetBucketVersioning
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetBucketPublicAccessBlock
                  - s3:PutBucketCORS
                  - s3:GetBucketCORS
                  - s3:PutLifecycleConfiguration
                  - s3:GetLifecycleConfiguration
                  - s3:PutEncryptionConfiguration
                  - s3:GetEncryptionConfiguration
                  - s3:PutBucketTagging
                  - s3:GetBucketTagging
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource:
                  - !Sub "arn:aws:s3:::numun-${Env}-*"
              # DynamoDB single-table.
              - Effect: Allow
                Action:
                  - dynamodb:CreateTable
                  - dynamodb:DeleteTable
                  - dynamodb:DescribeTable
                  - dynamodb:UpdateTable
                  - dynamodb:UpdateTimeToLive
                  - dynamodb:DescribeTimeToLive
                  - dynamodb:UpdateContinuousBackups
                  - dynamodb:DescribeContinuousBackups
                  - dynamodb:TagResource
                  - dynamodb:UntagResource
                  - dynamodb:ListTagsOfResource
                Resource:
                  - !Sub "arn:aws:dynamodb:*:${AWS::AccountId}:table/numun-${Env}*"
              # Cognito user pool + client.
              - Effect: Allow
                Action:
                  - cognito-idp:CreateUserPool
                  - cognito-idp:DeleteUserPool
                  - cognito-idp:DescribeUserPool
                  - cognito-idp:UpdateUserPool
                  - cognito-idp:CreateUserPoolClient
                  - cognito-idp:DeleteUserPoolClient
                  - cognito-idp:DescribeUserPoolClient
                  - cognito-idp:UpdateUserPoolClient
                  - cognito-idp:TagResource
                  - cognito-idp:UntagResource
                  - cognito-idp:ListTagsForResource
                  - cognito-idp:SetUserPoolMfaConfig
                  - cognito-idp:GetUserPoolMfaConfig
                Resource: "*"
              # SSM parameters published by base-data.
              - Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:AddTagsToResource
                  - ssm:RemoveTagsFromResource
                Resource:
                  - !Sub "arn:aws:ssm:*:${AWS::AccountId}:parameter/numun/${Env}/*"
              # SNS topics (alarms in us-east-2, billing-alarms in us-east-1).
              - Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:DeleteTopic
                  - sns:GetTopicAttributes
                  - sns:SetTopicAttributes
                  - sns:Subscribe
                  - sns:Unsubscribe
                  - sns:ListSubscriptionsByTopic
                  - sns:TagResource
                  - sns:UntagResource
                Resource:
                  - !Sub "arn:aws:sns:*:${AWS::AccountId}:numun-${Env}-*"
              # CloudWatch alarms (DDB throttles, billing).
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:TagResource
                  - cloudwatch:UntagResource
                  - cloudwatch:ListTagsForResource
                Resource:
                  - !Sub "arn:aws:cloudwatch:*:${AWS::AccountId}:alarm:numun-${Env}-*"
              # CloudFront distributions, functions, OACs, response-headers policies.
              - Effect: Allow
                Action:
                  - cloudfront:CreateDistribution
                  - cloudfront:UpdateDistribution
                  - cloudfront:DeleteDistribution
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:ListDistributions
                  - cloudfront:TagResource
                  - cloudfront:UntagResource
                  - cloudfront:CreateOriginAccessControl
                  - cloudfront:UpdateOriginAccessControl
                  - cloudfront:DeleteOriginAccessControl
                  - cloudfront:GetOriginAccessControl
                  - cloudfront:GetOriginAccessControlConfig
                  - cloudfront:CreateFunction
                  - cloudfront:UpdateFunction
                  - cloudfront:DeleteFunction
                  - cloudfront:DescribeFunction
                  - cloudfront:GetFunction
                  - cloudfront:PublishFunction
                  - cloudfront:CreateResponseHeadersPolicy
                  - cloudfront:UpdateResponseHeadersPolicy
                  - cloudfront:DeleteResponseHeadersPolicy
                  - cloudfront:GetResponseHeadersPolicy
                Resource: "*"
              # Route53 record sets in the numun.org hosted zone.
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:GetHostedZone
                  - route53:ListResourceRecordSets
                  - route53:GetChange
                Resource:
                  - "arn:aws:route53:::hostedzone/*"
                  - "arn:aws:route53:::change/*"
              # SAM packaging bucket (templates aren't currently SAM but this is
              # cheap to keep in case base-cdn grows a Lambda@Edge).
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:GetObjectVersion
                Resource:
                  - !Sub "arn:aws:s3:::numun-${Env}-sam-deploys-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::numun-${Env}-sam-deploys-${AWS::AccountId}/*"

Outputs:
  OIDCProviderArn:
    Description: ARN of the GitHub Actions OIDC identity provider.
    Value: !Ref GitHubOIDCProvider
  SamArtifactsBucketName:
    Description: SAM artifacts bucket — pass to `sam deploy --s3-bucket`.
    Value: !Ref SamArtifactsBucket
  DeployRoleApiArn:
    Description: ARN to set as role-to-assume in .github/workflows/api.yml.
    Value: !GetAtt DeployRoleApi.Arn
  DeployRoleSiteArn:
    Description: ARN to set as role-to-assume in .github/workflows/site.yml.
    Value: !GetAtt DeployRoleSite.Arn
  DeployRolePortalArn:
    Description: ARN to set as role-to-assume in .github/workflows/portal.yml.
    Value: !GetAtt DeployRolePortal.Arn
  DeployRoleCmsArn:
    Description: ARN to set as role-to-assume in .github/workflows/cms.yml.
    Value: !GetAtt DeployRoleCms.Arn
  DeployRoleInfraArn:
    Description: ARN to set as role-to-assume in .github/workflows/infra.yml.
    Value: !GetAtt DeployRoleInfra.Arn
