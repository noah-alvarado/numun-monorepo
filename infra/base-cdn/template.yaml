AWSTemplateFormatVersion: "2010-09-09"
Description: >
  NUMUN — base-cdn stack.

  Four CloudFront distributions (site, portal, cms, assets) with OAC
  bindings to the buckets created in base-data. Plus a shared
  response-headers policy (HSTS) and the www → apex / legacy /portal
  redirect CloudFront function.

  Depends on base-data being deployed (imports bucket ARNs). Depends on
  a us-east-1 ACM certificate covering numun.org + *.numun.org.

  Region: us-east-2.
  References: INFRASTRUCTURE.md §3.1, SECURITY.md §3.1, §3.4.

Parameters:
  CloudFrontCertificateArn:
    Type: String
    Description: ACM certificate ARN in us-east-1 covering numun.org + *.numun.org.
    AllowedPattern: "^arn:aws:acm:us-east-1:[0-9]{12}:certificate/.+$"

Resources:
  # ── CloudFront Origin Access Controls ───────────────────────────────────────
  SiteOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: numun-org-site-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  PortalOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: numun-org-portal-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CmsOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: numun-org-cms-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AssetsOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: numun-org-assets-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── Shared response-headers policy (HSTS etc.) ──────────────────────────────
  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: numun-prod-security-headers
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Preload: true
            Override: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true

  # ── www → apex + legacy /portal redirect ────────────────────────────────────
  WwwRedirectFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: numun-www-redirect
      AutoPublish: true
      FunctionConfig:
        Comment: Canonicalize numun.org host + legacy /portal redirect.
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var host = request.headers.host && request.headers.host.value;
          if (host === 'www.numun.org') {
            return {
              statusCode: 301,
              statusDescription: 'Moved Permanently',
              headers: { location: { value: 'https://numun.org' + request.uri } },
            };
          }
          if (request.uri === '/portal' || request.uri.indexOf('/portal/') === 0) {
            return {
              statusCode: 301,
              statusDescription: 'Moved Permanently',
              headers: { location: { value: 'https://portal.numun.org' + request.uri.substring(7) } },
            };
          }
          return request;
        }

  # ── CloudFront distributions ────────────────────────────────────────────────
  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: numun.org landing site
        Aliases:
          - numun.org
          - www.numun.org
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        ViewerCertificate:
          AcmCertificateArn: !Ref CloudFrontCertificateArn
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only
        Origins:
          - Id: site-bucket
            DomainName:
              Fn::ImportValue: numun-prod-base-data-SiteBucketRegionalDomain
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt SiteOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: site-bucket
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # Managed-CachingOptimized
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt WwwRedirectFunction.FunctionMetadata.FunctionARN

  PortalDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: portal.numun.org SPA
        Aliases:
          - portal.numun.org
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          AcmCertificateArn: !Ref CloudFrontCertificateArn
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only
        Origins:
          - Id: portal-bucket
            DomainName:
              Fn::ImportValue: numun-prod-base-data-PortalBucketRegionalDomain
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt PortalOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: portal-bucket
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy

  CmsDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: cms.numun.org Decap admin bundle
        Aliases:
          - cms.numun.org
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        ViewerCertificate:
          AcmCertificateArn: !Ref CloudFrontCertificateArn
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only
        Origins:
          - Id: cms-bucket
            DomainName:
              Fn::ImportValue: numun-prod-base-data-CmsBucketRegionalDomain
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt CmsOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: cms-bucket
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy

  AssetsDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: assets.numun.org public files (BG guides, CMS images)
        Aliases:
          - assets.numun.org
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        ViewerCertificate:
          AcmCertificateArn: !Ref CloudFrontCertificateArn
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only
        Origins:
          - Id: assets-bucket
            DomainName:
              Fn::ImportValue: numun-prod-base-data-AssetsBucketRegionalDomain
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt AssetsOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: assets-bucket
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6

  # ── Bucket policies (tie each S3 bucket to its single CloudFront OAC) ──────
  # Imports bucket ARNs from base-data via Fn::ImportValue and resolves bucket
  # names from those ARNs (last segment).
  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: numun-org-site
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub
              - "${Arn}/*"
              - { Arn: !ImportValue numun-prod-base-data-SiteBucketArn }
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}"

  PortalBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: numun-org-portal
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub
              - "${Arn}/*"
              - { Arn: !ImportValue numun-prod-base-data-PortalBucketArn }
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${PortalDistribution}"

  CmsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: numun-org-cms
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub
              - "${Arn}/*"
              - { Arn: !ImportValue numun-prod-base-data-CmsBucketArn }
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CmsDistribution}"

  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: numun-org-assets
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub
              - "${Arn}/*"
              - { Arn: !ImportValue numun-prod-base-data-AssetsBucketArn }
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AssetsDistribution}"

Outputs:
  SiteDistributionId:
    Value: !Ref SiteDistribution
  SiteDistributionDomainName:
    Value: !GetAtt SiteDistribution.DomainName
  PortalDistributionId:
    Value: !Ref PortalDistribution
  PortalDistributionDomainName:
    Value: !GetAtt PortalDistribution.DomainName
  CmsDistributionId:
    Value: !Ref CmsDistribution
  CmsDistributionDomainName:
    Value: !GetAtt CmsDistribution.DomainName
  AssetsDistributionId:
    Value: !Ref AssetsDistribution
  AssetsDistributionDomainName:
    Value: !GetAtt AssetsDistribution.DomainName
