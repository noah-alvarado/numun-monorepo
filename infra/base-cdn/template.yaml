AWSTemplateFormatVersion: "2010-09-09"
Description: >
  NUMUN — base-cdn stack.

  Four CloudFront distributions (site, portal, cms, assets) with OAC
  bindings to the buckets created in base-data. Plus a shared
  response-headers policy (HSTS), the www → apex / legacy /portal
  redirect CloudFront function, and the Route 53 alias records that
  point each public subdomain at its distribution.

  Depends on base-data being deployed (imports bucket ARNs). Depends on
  a us-east-1 ACM certificate covering the apex + *.apex.

  Region: us-east-2.
  References: INFRASTRUCTURE.md §3.1, SECURITY.md §3.1, §3.4.

Parameters:
  Env:
    Type: String
    AllowedPattern: "^[a-z][a-z0-9-]*$"
    Description: >
      Environment qualifier baked into resource names. `test` for staging,
      `prod` for a future real-prod account.
  RootDomain:
    Type: String
    Default: numun.org
    Description: Apex registered domain.
  EnvSubdomain:
    Type: String
    Default: ""
    Description: >
      Subdomain inserted between the environment and RootDomain (e.g.,
      `test` → apex `test.numun.org`). Empty for prod (apex = RootDomain).
  HostedZoneId:
    Type: String
    Description: Route 53 hosted zone id for RootDomain.
  CloudFrontCertificateArn:
    Type: String
    AllowedPattern: "^arn:aws:acm:us-east-1:[0-9]{12}:certificate/.+$"
    Description: >
      ACM cert ARN in us-east-1 covering the apex and *.apex. For staging
      this is `test.numun.org` + `*.test.numun.org`.

Conditions:
  HasSubdomain: !Not [!Equals [!Ref EnvSubdomain, ""]]

Resources:
  # ── CloudFront Origin Access Controls ───────────────────────────────────────
  SiteOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "numun-${Env}-site-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  PortalOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "numun-${Env}-portal-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CmsOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "numun-${Env}-cms-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AssetsOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "numun-${Env}-assets-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── Shared response-headers policy (HSTS etc.) ──────────────────────────────
  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "numun-${Env}-security-headers"
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Preload: true
            Override: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true

  # ── www → apex + legacy /portal redirect ────────────────────────────────────
  # Apex is computed per-environment via Fn::Sub. For staging the apex is
  # `test.numun.org` so the function redirects `www.test.numun.org` → `test.numun.org`.
  WwwRedirectFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "numun-${Env}-www-redirect"
      AutoPublish: true
      FunctionConfig:
        Comment: !Sub "Canonicalize ${Env} apex host + legacy /portal redirect."
        Runtime: cloudfront-js-2.0
      FunctionCode: !Sub
        - |
          function handler(event) {
            var request = event.request;
            var host = request.headers.host && request.headers.host.value;
            if (host === 'www.${Apex}') {
              return {
                statusCode: 301,
                statusDescription: 'Moved Permanently',
                headers: { location: { value: 'https://${Apex}' + request.uri } },
              };
            }
            if (request.uri === '/portal' || request.uri.indexOf('/portal/') === 0) {
              return {
                statusCode: 301,
                statusDescription: 'Moved Permanently',
                headers: { location: { value: 'https://portal.${Apex}' + request.uri.substring(7) } },
              };
            }
            return request;
          }
        - Apex: !If
            - HasSubdomain
            - !Sub "${EnvSubdomain}.${RootDomain}"
            - !Ref RootDomain

  # ── CloudFront distributions ────────────────────────────────────────────────
  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "Landing site for ${Env}"
        Aliases:
          - !If
            - HasSubdomain
            - !Sub "${EnvSubdomain}.${RootDomain}"
            - !Ref RootDomain
          - !If
            - HasSubdomain
            - !Sub "www.${EnvSubdomain}.${RootDomain}"
            - !Sub "www.${RootDomain}"
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        ViewerCertificate:
          AcmCertificateArn: !Ref CloudFrontCertificateArn
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only
        Origins:
          - Id: site-bucket
            DomainName:
              Fn::ImportValue: !Sub "numun-${Env}-base-data-SiteBucketRegionalDomain"
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt SiteOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: site-bucket
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # Managed-CachingOptimized
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt WwwRedirectFunction.FunctionMetadata.FunctionARN

  PortalDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "Portal SPA for ${Env}"
        Aliases:
          - !If
            - HasSubdomain
            - !Sub "portal.${EnvSubdomain}.${RootDomain}"
            - !Sub "portal.${RootDomain}"
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          AcmCertificateArn: !Ref CloudFrontCertificateArn
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only
        Origins:
          - Id: portal-bucket
            DomainName:
              Fn::ImportValue: !Sub "numun-${Env}-base-data-PortalBucketRegionalDomain"
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt PortalOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: portal-bucket
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy

  CmsDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "Decap admin bundle for ${Env}"
        Aliases:
          - !If
            - HasSubdomain
            - !Sub "cms.${EnvSubdomain}.${RootDomain}"
            - !Sub "cms.${RootDomain}"
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        ViewerCertificate:
          AcmCertificateArn: !Ref CloudFrontCertificateArn
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only
        Origins:
          - Id: cms-bucket
            DomainName:
              Fn::ImportValue: !Sub "numun-${Env}-base-data-CmsBucketRegionalDomain"
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt CmsOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: cms-bucket
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy

  AssetsDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "Public files (BG guides, CMS images) for ${Env}"
        Aliases:
          - !If
            - HasSubdomain
            - !Sub "assets.${EnvSubdomain}.${RootDomain}"
            - !Sub "assets.${RootDomain}"
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        ViewerCertificate:
          AcmCertificateArn: !Ref CloudFrontCertificateArn
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only
        Origins:
          - Id: assets-bucket
            DomainName:
              Fn::ImportValue: !Sub "numun-${Env}-base-data-AssetsBucketRegionalDomain"
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt AssetsOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: assets-bucket
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6

  # ── Bucket policies (tie each S3 bucket to its single CloudFront OAC) ──────
  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Sub "numun-${Env}-site"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub
              - "${Arn}/*"
              - Arn:
                  Fn::ImportValue: !Sub "numun-${Env}-base-data-SiteBucketArn"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}"

  PortalBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Sub "numun-${Env}-portal"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub
              - "${Arn}/*"
              - Arn:
                  Fn::ImportValue: !Sub "numun-${Env}-base-data-PortalBucketArn"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${PortalDistribution}"

  CmsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Sub "numun-${Env}-cms"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub
              - "${Arn}/*"
              - Arn:
                  Fn::ImportValue: !Sub "numun-${Env}-base-data-CmsBucketArn"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CmsDistribution}"

  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Sub "numun-${Env}-assets"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub
              - "${Arn}/*"
              - Arn:
                  Fn::ImportValue: !Sub "numun-${Env}-base-data-AssetsBucketArn"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AssetsDistribution}"

  # ── Route 53 alias records ────────────────────────────────────────────────
  # Point each public subdomain at its CloudFront distribution. CloudFront's
  # zone id is the magic constant Z2FDTNDATAQYW2 (us-east-1 / global).
  SiteApexRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !If
        - HasSubdomain
        - !Sub "${EnvSubdomain}.${RootDomain}."
        - !Sub "${RootDomain}."
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt SiteDistribution.DomainName
        EvaluateTargetHealth: false

  SiteWwwRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !If
        - HasSubdomain
        - !Sub "www.${EnvSubdomain}.${RootDomain}."
        - !Sub "www.${RootDomain}."
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt SiteDistribution.DomainName
        EvaluateTargetHealth: false

  PortalRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !If
        - HasSubdomain
        - !Sub "portal.${EnvSubdomain}.${RootDomain}."
        - !Sub "portal.${RootDomain}."
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt PortalDistribution.DomainName
        EvaluateTargetHealth: false

  CmsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !If
        - HasSubdomain
        - !Sub "cms.${EnvSubdomain}.${RootDomain}."
        - !Sub "cms.${RootDomain}."
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt CmsDistribution.DomainName
        EvaluateTargetHealth: false

  AssetsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !If
        - HasSubdomain
        - !Sub "assets.${EnvSubdomain}.${RootDomain}."
        - !Sub "assets.${RootDomain}."
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt AssetsDistribution.DomainName
        EvaluateTargetHealth: false

Outputs:
  SiteDistributionId:
    Value: !Ref SiteDistribution
  SiteDistributionDomainName:
    Value: !GetAtt SiteDistribution.DomainName
  PortalDistributionId:
    Value: !Ref PortalDistribution
  PortalDistributionDomainName:
    Value: !GetAtt PortalDistribution.DomainName
  CmsDistributionId:
    Value: !Ref CmsDistribution
  CmsDistributionDomainName:
    Value: !GetAtt CmsDistribution.DomainName
  AssetsDistributionId:
    Value: !Ref AssetsDistribution
  AssetsDistributionDomainName:
    Value: !GetAtt AssetsDistribution.DomainName
