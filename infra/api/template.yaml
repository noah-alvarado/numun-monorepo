AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  NUMUN — api stack (fast-changing).

  HTTP API + Lambdalith at api.${Apex}, where Apex is composed from
  EnvSubdomain + RootDomain. Code lives in /api/cmd/api; SAM build
  cross-compiles a linux/arm64 `bootstrap` binary via /api/Makefile.

  Region: us-east-2.
  References: APPLICATION.md §4, API.md, SECURITY.md §3.2.

Parameters:
  Env:
    Type: String
    AllowedPattern: "^[a-z][a-z0-9-]*$"
    Description: >
      Environment qualifier baked into named resources. `test` for staging,
      `prod` for a future real-prod account.
  RootDomain:
    Type: String
    Default: numun.org
    Description: Apex registered domain.
  EnvSubdomain:
    Type: String
    Default: ""
    Description: >
      Subdomain inserted between the environment and RootDomain (e.g.,
      `test` → apex `test.numun.org`). Empty for prod (apex = RootDomain).
  CommitSha:
    Type: String
    Default: dev
    Description: Git commit stamped into the binary via ldflags (set by CI).
  ReleaseVersion:
    Type: String
    Default: 0.0.0
    Description: Release version stamped into the binary via ldflags.
  ApiCertificateArn:
    Type: String
    Description: ACM cert ARN in us-east-2 for the api subdomain.
    AllowedPattern: "^arn:aws:acm:us-east-2:[0-9]{12}:certificate/.+$"
  HostedZoneId:
    Type: String
    Description: Route 53 zone id for RootDomain.
  CognitoUserPoolId:
    Type: String
    Description: Cognito user pool id. Exported by the base-data stack.
  CognitoUserPoolArn:
    Type: String
    Description: Cognito user pool ARN. Exported by the base-data stack.
  CognitoClientId:
    Type: String
    Description: Cognito app client id used by the portal.
  SentryDsn:
    Type: String
    Default: ""
    NoEcho: true
    Description: >
      Sentry DSN for backend error reporting. Empty disables Sentry entirely
      (init no-ops; observability.InitFromEnv returns false). Source is the
      `SENTRY_DSN` GitHub environment secret on the deploy workflow.

Conditions:
  HasSubdomain: !Not [!Equals [!Ref EnvSubdomain, ""]]

Globals:
  Function:
    Runtime: provided.al2023
    Architectures: [arm64]
    Timeout: 29 # API Gateway HTTP API hard ceiling.
    # Bumped from 512 → 2048 for M7's assignment algorithm; gives Go's GC
    # headroom while staying inside the 29s API Gateway window. The cognito-
    # post-confirmation function overrides this back to 256 MB.
    MemorySize: 2048
    Tracing: Active
    LoggingConfig:
      LogFormat: JSON

Resources:
  # ── Lambda execution role ──────────────────────────────────────────────────
  # Minimal for M1 (health endpoint only). Subsequent milestones expand:
  # DDB R/W on numun-${Env}, SES SendEmail, SSM GetParameter, S3 R/W on uploads
  # + artifacts, Cognito admin actions. See SECURITY.md §3.2.
  ApiFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "numun-${Env}-api-execution"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: numun-api-base
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # DDB single-table access — covers base table + GSIs.
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:TransactGetItems
                  - dynamodb:TransactWriteItems
                  - dynamodb:ConditionCheckItem
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/numun-${Env}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/numun-${Env}/index/*"
              # SSM secrets read at cold start.
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/numun/${Env}/*"
              # Cognito operations used by AuthService.Exchange (token refresh,
              # token revoke), UserService.InviteStaff, and the
              # RecordPasswordResetCompleted lookup. Scoped to this pool.
              - Effect: Allow
                Action:
                  - cognito-idp:InitiateAuth
                  - cognito-idp:RevokeToken
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminGetUser
                  - cognito-idp:AdminUpdateUserAttributes
                Resource:
                  - !Ref CognitoUserPoolArn
              # M6 bulk-delegate uploads: presign PUTs + read uploaded files.
              # Bucket-level ListBucket isn't needed; the API only reads the
              # specific key it just presigned.
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::numun-${Env}-uploads/*"
              # M9 email pipeline: SES SendEmail for the synchronous
              # transactional path and SQS SendMessage to enqueue announcements
              # + the new-registration debounce summary. See EMAIL.md §5.
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
                Condition:
                  StringEquals:
                    ses:FromAddress:
                      - !Sub "noreply@mail.${RootDomain}"
                      - !Sub "announcements@mail.${RootDomain}"
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !GetAtt EmailSendQueue.Arn

  # ── HTTP API ────────────────────────────────────────────────────────────────
  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: !Sub "numun-${Env}-api"
      CodeUri: ../../api
      Handler: bootstrap
      Role: !GetAtt ApiFunctionRole.Arn
      Environment:
        Variables:
          AWS_REGION_NAME: !Ref AWS::Region
          DDB_TABLE_NAME: !Sub "numun-${Env}"
          UPLOADS_BUCKET_NAME: !Sub "numun-${Env}-uploads"
          COMMIT_SHA: !Ref CommitSha
          RELEASE_VERSION: !Ref ReleaseVersion
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref CognitoClientId
          ENV_NAME: !Ref Env
          SENTRY_DSN: !Ref SentryDsn
          SENTRY_ENVIRONMENT: !Ref Env
          SENTRY_RELEASE: !Ref CommitSha
          # M9 email pipeline. EMAIL.md §5.
          EMAIL_SENDER_TRANSACTIONAL: !Sub "noreply@mail.${RootDomain}"
          EMAIL_SENDER_ANNOUNCEMENTS: !Sub "announcements@mail.${RootDomain}"
          EMAIL_SENDER_COGNITO: !Sub "cognito@mail.${RootDomain}"
          EMAIL_UNSUBSCRIBE_BASE_URL: !If
            - HasSubdomain
            - !Sub "https://api.${EnvSubdomain}.${RootDomain}/v1/email/unsubscribe"
            - !Sub "https://api.${RootDomain}/v1/email/unsubscribe"
          # EMAIL_UNSUBSCRIBE_SECRET is loaded from SSM at cold-start (mirrors
          # the cms_oauth/state_secret pattern). When unset, the List-
          # Unsubscribe header is omitted (announcements still send; recipients
          # can opt out via the admin re-opt-in path). One-time bootstrap:
          #   aws ssm put-parameter --name /numun/${Env}/email/unsubscribe_secret \
          #     --value "<32-byte random>" --type SecureString
          EMAIL_QUEUE_URL: !Ref EmailSendQueue
          EMAIL_CONFIGURATION_SET: !Ref EmailConfigurationSet
          PORTAL_BASE_URL: !If
            - HasSubdomain
            - !Sub "https://portal.${EnvSubdomain}.${RootDomain}"
            - !Sub "https://portal.${RootDomain}"
          ASSETS_BASE_URL: !If
            - HasSubdomain
            - !Sub "https://assets.${EnvSubdomain}.${RootDomain}"
            - !Sub "https://assets.${RootDomain}"
          COOKIE_DOMAIN: !If
            - HasSubdomain
            - !Sub ".${EnvSubdomain}.${RootDomain}"
            - !Sub ".${RootDomain}"
          COOKIE_SECURE: "true"
          # Used by /cms-oauth/* to build the GitHub redirect_uri and the
          # postMessage target origin. See CMS_CONTENT_MODEL.md §8.3.
          ROOT_DOMAIN: !Ref RootDomain
          ENV_SUBDOMAIN: !Ref EnvSubdomain
          ENV: !Ref Env
          # The CMS-OAuth proxy reads three SSM SecureString params at
          # cold-start:
          #   /numun/${Env}/cms_oauth/client_id
          #   /numun/${Env}/cms_oauth/client_secret
          #   /numun/${Env}/cms_oauth/state_secret
          # CloudFormation cannot create SecureString parameters natively, so
          # these MUST be created out-of-band before the first deploy. See
          # docs/cms-oauth-app-setup.md (TODO: author this runbook in a
          # follow-up; it is the GitHub OAuth App registration walkthrough).
          # The existing IAM policy below already permits ssm:GetParameter on
          # the full /numun/${Env}/* tree, so no IAM change is needed.
          #
          # M11 — AwardService writes back to the CMS via a GitHub App
          # (`numun-cms-bot`). The Lambdalith reads five params from SSM at
          # cold-start:
          #   /numun/${Env}/github_app/app_id           (String)
          #   /numun/${Env}/github_app/installation_id  (String)
          #   /numun/${Env}/github_app/private_key      (SecureString — PEM)
          #   /numun/${Env}/github_app/repo             (String — "owner/name")
          #   /numun/${Env}/github_app/branch           (String, optional; defaults "main")
          # These also live under the same /numun/${Env}/* tree, so the
          # existing IAM grant covers them. See docs/runbooks/github-app-setup.md.
      Events:
        AnyHttp:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        HealthHttp:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: ANY

  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ApiFunction}"
      RetentionInDays: 30

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - !If
            - HasSubdomain
            - !Sub "https://portal.${EnvSubdomain}.${RootDomain}"
            - !Sub "https://portal.${RootDomain}"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-CSRF-Token
          - Idempotency-Key
          - Connect-Protocol-Version
          - Connect-Timeout-Ms
        AllowCredentials: true
        MaxAge: 600
      Domain:
        DomainName: !If
          - HasSubdomain
          - !Sub "api.${EnvSubdomain}.${RootDomain}"
          - !Sub "api.${RootDomain}"
        CertificateArn: !Ref ApiCertificateArn
        EndpointConfiguration: REGIONAL
        SecurityPolicy: TLS_1_2
        Route53:
          HostedZoneId: !Ref HostedZoneId

  # ── Cognito post-confirmation Lambda ───────────────────────────────────────
  # Triggered by Cognito after a user confirms their sign-up email. Writes the
  # DDB User row + signup_completed audit event so the first authenticated
  # API call doesn't race against a missing mirror. See AUTH.md §3.1.
  CognitoPostConfirmationFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      # Name must match the numun-${Env}-api-* pattern that the deploy-api OIDC
      # role is allowed to manage via iam:CreateRole / iam:PassRole.
      RoleName: !Sub "numun-${Env}-api-cognito-post-confirmation-execution"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: numun-cognito-trigger-ddb
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/numun-${Env}"

  CognitoPostConfirmationFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: !Sub "numun-${Env}-api-cognito-post-confirmation"
      CodeUri: ../../api
      Handler: bootstrap
      Role: !GetAtt CognitoPostConfirmationFunctionRole.Arn
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          AWS_REGION_NAME: !Ref AWS::Region
          DDB_TABLE_NAME: !Sub "numun-${Env}"
          ENV_NAME: !Ref Env
          SENTRY_DSN: !Ref SentryDsn
          SENTRY_ENVIRONMENT: !Ref Env
          SENTRY_RELEASE: !Ref CommitSha

  CognitoPostConfirmationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${CognitoPostConfirmationFunction}"
      RetentionInDays: 30

  CognitoPostConfirmationInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CognitoPostConfirmationFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !Ref CognitoUserPoolArn

  # The trigger attachment itself lives on the user pool, which is owned by
  # the base-data stack. We expose the function ARN as an output here; a
  # one-time `aws cognito-idp update-user-pool --lambda-config
  # PostConfirmation=<arn>` wires it. Captured in the first-admin-bootstrap
  # and seed-users runbooks so it gets executed during deployment.

  # ── M9 Email pipeline ──────────────────────────────────────────────────────
  # SQS pair: numun-${Env}-email-send (main) + numun-${Env}-email-send-dlq.
  # Max-receive 3 → DLQ per EMAIL.md §5.4. Visibility timeout 60s; worker
  # Lambda timeout is 30s so a stuck process is redelivered after one window.
  EmailSendQueueDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "numun-${Env}-email-send-dlq"
      MessageRetentionPeriod: 1209600 # 14 days, SQS max.

  EmailSendQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "numun-${Env}-email-send"
      VisibilityTimeout: 60
      MessageRetentionPeriod: 1209600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EmailSendQueueDLQ.Arn
        maxReceiveCount: 3

  EmailFeedbackTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "numun-${Env}-email-feedback"

  # SES configuration set so bounce/complaint events are routed to the SNS
  # topic. The destination + the SES-domain-identity wiring are configured
  # manually post-deploy (EMAIL.md §6.1; the SES domain identity itself is
  # outside SAM per the M1 runbook).
  EmailConfigurationSet:
    Type: AWS::SES::ConfigurationSet
    Properties:
      Name: !Sub "numun-${Env}-email"

  # ── EmailWorker Lambda ──────────────────────────────────────────────────────
  EmailWorkerFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "numun-${Env}-api-email-worker-execution"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: numun-email-worker
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/numun-${Env}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/numun-${Env}/index/*"
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !GetAtt EmailSendQueue.Arn
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
                Condition:
                  StringEquals:
                    ses:FromAddress:
                      - !Sub "noreply@mail.${RootDomain}"
                      - !Sub "announcements@mail.${RootDomain}"

  EmailWorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: !Sub "numun-${Env}-api-email-worker"
      CodeUri: ../../api
      Handler: bootstrap
      Role: !GetAtt EmailWorkerFunctionRole.Arn
      MemorySize: 512
      Timeout: 30
      Environment:
        Variables:
          DDB_TABLE_NAME: !Sub "numun-${Env}"
          EMAIL_SENDER_TRANSACTIONAL: !Sub "noreply@mail.${RootDomain}"
          EMAIL_SENDER_ANNOUNCEMENTS: !Sub "announcements@mail.${RootDomain}"
          EMAIL_QUEUE_URL: !Ref EmailSendQueue
          EMAIL_CONFIGURATION_SET: !Ref EmailConfigurationSet
          PORTAL_BASE_URL: !If
            - HasSubdomain
            - !Sub "https://portal.${EnvSubdomain}.${RootDomain}"
            - !Sub "https://portal.${RootDomain}"
          ASSETS_BASE_URL: !If
            - HasSubdomain
            - !Sub "https://assets.${EnvSubdomain}.${RootDomain}"
            - !Sub "https://assets.${RootDomain}"
          ENV_NAME: !Ref Env
          SENTRY_DSN: !Ref SentryDsn
          SENTRY_ENVIRONMENT: !Ref Env
          SENTRY_RELEASE: !Ref CommitSha
      Events:
        SQS:
          Type: SQS
          Properties:
            Queue: !GetAtt EmailSendQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures

  EmailWorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${EmailWorkerFunction}"
      RetentionInDays: 30

  # ── EmailFeedback Lambda (SNS subscriber for bounces/complaints) ───────────
  EmailFeedbackFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "numun-${Env}-api-email-feedback-execution"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: numun-email-feedback
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/numun-${Env}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/numun-${Env}/index/*"

  EmailFeedbackFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: !Sub "numun-${Env}-api-email-feedback"
      CodeUri: ../../api
      Handler: bootstrap
      Role: !GetAtt EmailFeedbackFunctionRole.Arn
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          DDB_TABLE_NAME: !Sub "numun-${Env}"
          ENV_NAME: !Ref Env
          SENTRY_DSN: !Ref SentryDsn
          SENTRY_ENVIRONMENT: !Ref Env
          SENTRY_RELEASE: !Ref CommitSha
      Events:
        Feedback:
          Type: SNS
          Properties:
            Topic: !Ref EmailFeedbackTopic

  EmailFeedbackLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${EmailFeedbackFunction}"
      RetentionInDays: 30

  # DLQ-depth alarm — operations want to know when sends are failing repeatedly.
  EmailSendDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "numun-${Env}-email-dlq-depth"
      AlarmDescription: A message landed in the email-send DLQ.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt EmailSendQueueDLQ.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Sub "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:numun-${Env}-alarms"

  # ── Alarms ──────────────────────────────────────────────────────────────────
  ApiFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "numun-${Env}-api-lambda-errors"
      AlarmDescription: Lambdalith error count spike.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        # SNS topic is created by the base stack; this stack assumes it exists.
        - !Sub "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:numun-${Env}-alarms"

Outputs:
  ApiFunctionName:
    Value: !Ref ApiFunction
  HttpApiId:
    Value: !Ref HttpApi
  HttpApiEndpoint:
    Description: Internal HTTP API invoke URL — use the api.${Apex} custom domain in practice.
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  CognitoPostConfirmationFunctionArn:
    Description: >
      ARN to wire into the Cognito user pool's LambdaConfig.PostConfirmation.
      Run once after deploy:
        aws cognito-idp update-user-pool --user-pool-id <id> \
          --lambda-config PostConfirmation=<arn>
    Value: !GetAtt CognitoPostConfirmationFunction.Arn
  EmailSendQueueUrl:
    Value: !Ref EmailSendQueue
  EmailSendQueueArn:
    Value: !GetAtt EmailSendQueue.Arn
  EmailFeedbackTopicArn:
    Description: >
      SNS topic to subscribe SES bounce + complaint notifications to. Wire via:
        aws ses put-identity-notification-topic --identity mail.${RootDomain} \
          --notification-type Bounce --sns-topic <arn>
        aws ses put-identity-notification-topic --identity mail.${RootDomain} \
          --notification-type Complaint --sns-topic <arn>
    Value: !Ref EmailFeedbackTopic
  EmailConfigurationSetName:
    Value: !Ref EmailConfigurationSet
  EmailWorkerFunctionArn:
    Value: !GetAtt EmailWorkerFunction.Arn
  EmailFeedbackFunctionArn:
    Value: !GetAtt EmailFeedbackFunction.Arn
