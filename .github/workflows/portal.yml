name: deploy portal

on:
  push:
    branches: [main]
    paths:
      - "portal/**"
      - "packages/tailwind-tokens/**"
      - ".github/workflows/portal.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-portal
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: nalvarado
    env:
      AWS_REGION: us-east-2
      BUCKET: numun-org-portal
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: build portal
        env:
          VITE_API_BASE_URL: https://api.numun.org
        run: pnpm --filter @numun/portal build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_PORTAL_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: sync to S3
        run: |
          aws s3 sync portal/dist/ "s3://$BUCKET/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp portal/dist/index.html "s3://$BUCKET/index.html" \
            --cache-control "public, max-age=60, must-revalidate" \
            --content-type "text/html; charset=utf-8"
      - name: CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.PORTAL_DISTRIBUTION_ID }}" \
            --paths "/index.html"
