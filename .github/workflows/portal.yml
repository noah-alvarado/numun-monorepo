name: deploy portal

on:
  push:
    branches: [main]
    paths:
      - "portal/**"
      - "packages/tailwind-tokens/**"
      - ".github/workflows/portal.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to deploy to
        required: false
        default: test
        type: choice
        options: [test, prod]
      bump:
        description: Which semver component to bump
        required: false
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  id-token: write
  contents: write # push version tags

concurrency:
  group: deploy-portal
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'test' }}
      url: https://portal.${{ vars.APEX_DOMAIN }}
    env:
      ENV: ${{ inputs.environment || 'test' }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      BUCKET: numun-${{ inputs.environment || 'test' }}-portal
    steps:
      - uses: actions/checkout@v4
      - name: compute version
        id: version
        uses: ./.github/actions/compute-version
        with:
          app: portal
          bump: ${{ inputs.bump || 'patch' }}
          version-file: portal/package.json
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: build portal
        env:
          VITE_API_BASE_URL: https://api.${{ vars.APEX_DOMAIN }}
          VITE_COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
          VITE_VERSION: ${{ steps.version.outputs.version }}
        run: pnpm --filter @numun/portal build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_PORTAL_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: sync to S3
        run: |
          aws s3 sync portal/dist/ "s3://$BUCKET/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp portal/dist/index.html "s3://$BUCKET/index.html" \
            --cache-control "public, max-age=60, must-revalidate" \
            --content-type "text/html; charset=utf-8"
      - name: CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.PORTAL_DISTRIBUTION_ID }}" \
            --paths "/index.html"
      - name: tag release
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"
