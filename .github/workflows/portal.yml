name: deploy portal

on:
  push:
    branches: [main]
    paths:
      - "portal/**"
      - "packages/tailwind-tokens/**"
      - "infra/envs/**"
      - "scripts/load-env.sh"
      - "scripts/load-stack-outputs.sh"
      - ".github/workflows/portal.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to deploy to
        required: false
        default: test
        type: choice
        options: [test, prod]
      bump:
        description: Which semver component to bump
        required: false
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  id-token: write
  contents: write # push version tags

concurrency:
  group: deploy-portal
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ENV: ${{ inputs.environment || 'test' }}
    environment:
      name: ${{ inputs.environment || 'test' }}
      url: ${{ inputs.environment == 'prod' && 'https://portal.numun.org' || 'https://portal.test.numun.org' }}
    steps:
      - uses: actions/checkout@v4
      - name: load env config
        run: scripts/load-env.sh "$ENV"
      - name: derive deploy role + bucket
        run: |
          echo "DEPLOY_ROLE_PORTAL_ARN=arn:aws:iam::${AWS_ACCOUNT_ID}:role/numun-${ENV_NAME}-deploy-portal" >> "$GITHUB_ENV"
          echo "BUCKET=numun-${ENV_NAME}-portal" >> "$GITHUB_ENV"
      - name: compute version
        id: version
        uses: ./.github/actions/compute-version
        with:
          app: portal
          bump: ${{ inputs.bump || 'patch' }}
          version-file: portal/package.json
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_PORTAL_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: load base-data + base-cdn stack outputs
        run: |
          scripts/load-stack-outputs.sh "numun-${ENV_NAME}-base-data"
          scripts/load-stack-outputs.sh "numun-${ENV_NAME}-base-cdn"
      - name: load Sentry DSN from SSM
        # Sentry DSN is stored as a SecureString at /numun/${ENV}/sentry/dsn.
        # When unset, the export is empty and Vite tree-shakes Sentry out
        # of the portal bundle (portal/src/lib/sentry.ts no-ops).
        run: |
          DSN=$(aws ssm get-parameter \
            --name "/numun/$ENV_NAME/sentry/dsn" \
            --with-decryption \
            --query 'Parameter.Value' \
            --output text 2>/dev/null || echo "")
          if [ -n "$DSN" ]; then
            echo "::add-mask::$DSN"
          fi
          echo "VITE_SENTRY_DSN=$DSN" >> "$GITHUB_ENV"
      - name: build portal
        env:
          VITE_API_BASE_URL: https://api.${{ env.APEX_DOMAIN }}
          VITE_COGNITO_USER_POOL_ID: ${{ env.CognitoUserPoolId }}
          VITE_COGNITO_CLIENT_ID: ${{ env.CognitoClientId }}
          VITE_VERSION: ${{ steps.version.outputs.version }}
          VITE_ENV_NAME: ${{ env.ENV }}
          VITE_RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: pnpm --filter @numun/portal build
      - name: sync to S3
        run: |
          aws s3 sync portal/dist/ "s3://$BUCKET/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp portal/dist/index.html "s3://$BUCKET/index.html" \
            --cache-control "public, max-age=60, must-revalidate" \
            --content-type "text/html; charset=utf-8"
      - name: CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$PortalDistributionId" \
            --paths "/index.html"
      - name: tag release
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"
