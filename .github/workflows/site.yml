name: deploy site

# workflow_dispatch is the manual trigger for "admin manually triggers a site
# rebuild after a conference status change in DDB" (per CMS_CONTENT_MODEL.md §9.2).
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "content/**"
      - "packages/tailwind-tokens/**"
      - ".github/workflows/site.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to deploy to
        required: false
        default: test
        type: choice
        options: [test, prod]
      bump:
        description: Which semver component to bump
        required: false
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  id-token: write
  contents: write # push version tags

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'test' }}
      url: https://${{ vars.APEX_DOMAIN }}
    env:
      AWS_REGION: us-east-2
      BUCKET: numun-${{ vars.ENV_NAME }}-site
      # Prefer an explicit override; otherwise derive from APEX_DOMAIN
      # (e.g. test.numun.org -> https://api.test.numun.org).
      API_BASE_URL: ${{ vars.API_BASE_URL != '' && vars.API_BASE_URL || format('https://api.{0}', vars.APEX_DOMAIN) }}
    steps:
      - uses: actions/checkout@v4
      - name: compute version
        id: version
        uses: ./.github/actions/compute-version
        with:
          app: site
          bump: ${{ inputs.bump || 'patch' }}
          version-file: site/package.json
      - name: Fetch active conference
        # Calls PublicService.GetActiveConference and writes the result to
        # content/_generated/active-conference.json for the Astro build to
        # consume. On any failure (network, non-2xx, malformed JSON), writes
        # a fallback file so the build still succeeds with a "between
        # conferences" placeholder (see CMS_CONTENT_MODEL.md §9.1).
        run: |
          mkdir -p content/_generated
          response=$(curl -sS --max-time 10 -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data '{}' \
            "${API_BASE_URL}/numun.v1.PublicService/GetActiveConference" \
            || true)

          if echo "$response" | jq -e '.conference' >/dev/null 2>&1; then
            echo "$response" | jq '.conference // null' > content/_generated/active-conference.json
          else
            echo "Active-conference fetch failed; writing fallback." >&2
            echo '{"conferenceId": null}' > content/_generated/active-conference.json
          fi

          echo "Active conference file:"
          cat content/_generated/active-conference.json
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: build site
        # SITE_BASE flows into `Astro.site` so canonical URLs, sitemap.xml,
        # and feed.xml carry the env's apex. PUBLIC_VERSION is the semver
        # for this deploy; Astro exposes PUBLIC_*-prefixed env vars to the
        # client bundle via import.meta.env.
        env:
          SITE_BASE: https://${{ vars.APEX_DOMAIN }}
          PUBLIC_VERSION: ${{ steps.version.outputs.version }}
        run: pnpm --filter @numun/site build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_SITE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: sync to S3
        run: |
          aws s3 sync site/dist/ "s3://$BUCKET/" \
            --delete \
            --cache-control "public, max-age=300" \
            --exclude "*.html"
          aws s3 sync site/dist/ "s3://$BUCKET/" \
            --cache-control "public, max-age=60, must-revalidate" \
            --content-type "text/html; charset=utf-8" \
            --exclude "*" --include "*.html"
      - name: CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.SITE_DISTRIBUTION_ID }}" \
            --paths "/*"
      - name: tag release
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"
