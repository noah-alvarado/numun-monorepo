name: deploy cms

on:
  push:
    branches: [main]
    paths:
      - "cms/**"
      - "infra/envs/**"
      - "scripts/load-env.sh"
      - "scripts/load-stack-outputs.sh"
      - ".github/workflows/cms.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to deploy to
        required: false
        default: test
        type: choice
        options: [test, prod]
      bump:
        description: Which semver component to bump
        required: false
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  id-token: write
  contents: write # push version tags

concurrency:
  group: deploy-cms
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ENV: ${{ inputs.environment || 'test' }}
    environment:
      name: ${{ inputs.environment || 'test' }}
      url: ${{ inputs.environment == 'prod' && 'https://cms.numun.org' || 'https://cms.test.numun.org' }}
    steps:
      - uses: actions/checkout@v4
      - name: load env config
        run: scripts/load-env.sh "$ENV"
      - name: derive deploy role + bucket
        run: |
          echo "DEPLOY_ROLE_CMS_ARN=arn:aws:iam::${AWS_ACCOUNT_ID}:role/numun-${ENV_NAME}-deploy-cms" >> "$GITHUB_ENV"
          echo "BUCKET=numun-${ENV_NAME}-cms" >> "$GITHUB_ENV"
      - name: compute version
        id: version
        uses: ./.github/actions/compute-version
        with:
          app: cms
          bump: ${{ inputs.bump || 'patch' }}
          version-file: cms/package.json
      - name: Substitute placeholders in config.yml
        # config.yml is committed with `__APEX_DOMAIN__` and `__GITHUB_REPO__`
        # tokens; we resolve them here per env. APEX_DOMAIN comes from the
        # env YAML (`test.numun.org` for test, `numun.org` for prod).
        # GITHUB_REPO comes from the workflow context (`<owner>/<name>`).
        env:
          GITHUB_REPO: ${{ github.repository }}
        run: |
          if [[ -z "$APEX_DOMAIN" ]]; then
            echo "APEX_DOMAIN is unset; load-env.sh failed earlier?" >&2
            exit 1
          fi
          if [[ -z "$GITHUB_REPO" ]]; then
            echo "github.repository is unset; cannot resolve config.yml placeholders." >&2
            exit 1
          fi
          # In-place substitution into a build copy so the working tree stays clean.
          mkdir -p cms-dist
          cp -r cms/. cms-dist/
          sed -i "s|__APEX_DOMAIN__|${APEX_DOMAIN}|g" cms-dist/config.yml
          sed -i "s|__GITHUB_REPO__|${GITHUB_REPO}|g" cms-dist/config.yml
          # Sanity-check: no placeholders should survive.
          for token in __APEX_DOMAIN__ __GITHUB_REPO__; do
            if grep -q "$token" cms-dist/config.yml; then
              echo "Placeholder substitution failed; $token still present." >&2
              exit 1
            fi
          done
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_CMS_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: load CDN stack outputs
        run: scripts/load-stack-outputs.sh "numun-${ENV_NAME}-base-cdn"
      - name: sync to S3
        # cms is just a Decap-CDN bootstrap + config.yml — static; no build.
        run: |
          aws s3 sync cms-dist/ "s3://$BUCKET/" \
            --delete \
            --exclude "package.json" \
            --exclude "node_modules/*" \
            --cache-control "public, max-age=60, must-revalidate"
      - name: CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CmsDistributionId" \
            --paths "/*"
      - name: tag release
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"
