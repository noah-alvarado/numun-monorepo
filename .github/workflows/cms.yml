name: deploy cms

on:
  push:
    branches: [main]
    paths:
      - "cms/**"
      - ".github/workflows/cms.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to deploy to
        required: false
        default: test
        type: choice
        options: [test, prod]
      bump:
        description: Which semver component to bump
        required: false
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  id-token: write
  contents: write # push version tags

concurrency:
  group: deploy-cms
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'test' }}
      url: https://cms.${{ vars.APEX_DOMAIN }}
    env:
      AWS_REGION: us-east-2
      BUCKET: numun-${{ vars.ENV_NAME }}-cms
    steps:
      - uses: actions/checkout@v4
      - name: compute version
        id: version
        uses: ./.github/actions/compute-version
        with:
          app: cms
          bump: ${{ inputs.bump || 'patch' }}
          version-file: cms/package.json
      - name: Substitute env-specific domain in config.yml
        # config.yml is committed with `__APEX_DOMAIN__` tokens; we resolve them
        # here per env. APEX_DOMAIN is set on the env-scoped GitHub Environment
        # (e.g. `test.numun.org` for test, `numun.org` for prod).
        env:
          APEX_DOMAIN: ${{ vars.APEX_DOMAIN }}
        run: |
          if [[ -z "$APEX_DOMAIN" ]]; then
            echo "vars.APEX_DOMAIN is unset; cannot resolve config.yml placeholders." >&2
            exit 1
          fi
          # In-place substitution into a build copy so the working tree stays clean.
          mkdir -p cms-dist
          cp -r cms/. cms-dist/
          sed -i "s|__APEX_DOMAIN__|${APEX_DOMAIN}|g" cms-dist/config.yml
          # Sanity-check: no placeholders should survive.
          if grep -q "__APEX_DOMAIN__" cms-dist/config.yml; then
            echo "Placeholder substitution failed; __APEX_DOMAIN__ still present." >&2
            exit 1
          fi
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_CMS_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: sync to S3
        # cms is just a Decap-CDN bootstrap + config.yml — static; no build.
        run: |
          aws s3 sync cms-dist/ "s3://$BUCKET/" \
            --delete \
            --exclude "package.json" \
            --exclude "node_modules/*" \
            --cache-control "public, max-age=60, must-revalidate"
      - name: CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CMS_DISTRIBUTION_ID }}" \
            --paths "/*"
      - name: tag release
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"
