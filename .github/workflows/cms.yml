name: deploy cms

on:
  push:
    branches: [main]
    paths:
      - "cms/**"
      - ".github/workflows/cms.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to deploy to
        required: false
        default: test
        type: choice
        options: [test, prod]
      bump:
        description: Which semver component to bump
        required: false
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  id-token: write
  contents: write # push version tags

concurrency:
  group: deploy-cms
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment || 'test' }}
      url: https://cms.${{ vars.APEX_DOMAIN }}
    env:
      ENV: ${{ inputs.environment || 'test' }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      BUCKET: numun-${{ inputs.environment || 'test' }}-cms
    steps:
      - uses: actions/checkout@v4
      - name: compute version
        id: version
        uses: ./.github/actions/compute-version
        with:
          app: cms
          bump: ${{ inputs.bump || 'patch' }}
          version-file: cms/package.json
      - name: Substitute placeholders in config.yml
        # config.yml is committed with `__APEX_DOMAIN__` and `__GITHUB_REPO__`
        # tokens; we resolve them here per env. APEX_DOMAIN is set on the
        # env-scoped GitHub Environment (e.g. `test.numun.org` for test,
        # `numun.org` for prod). GITHUB_REPO comes from the workflow context
        # (`<owner>/<name>`), so renaming or forking the repo doesn't require
        # touching git-tracked config.
        env:
          APEX_DOMAIN: ${{ vars.APEX_DOMAIN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          if [[ -z "$APEX_DOMAIN" ]]; then
            echo "vars.APEX_DOMAIN is unset; cannot resolve config.yml placeholders." >&2
            exit 1
          fi
          if [[ -z "$GITHUB_REPO" ]]; then
            echo "github.repository is unset; cannot resolve config.yml placeholders." >&2
            exit 1
          fi
          # In-place substitution into a build copy so the working tree stays clean.
          mkdir -p cms-dist
          cp -r cms/. cms-dist/
          sed -i "s|__APEX_DOMAIN__|${APEX_DOMAIN}|g" cms-dist/config.yml
          sed -i "s|__GITHUB_REPO__|${GITHUB_REPO}|g" cms-dist/config.yml
          # Sanity-check: no placeholders should survive.
          for token in __APEX_DOMAIN__ __GITHUB_REPO__; do
            if grep -q "$token" cms-dist/config.yml; then
              echo "Placeholder substitution failed; $token still present." >&2
              exit 1
            fi
          done
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_CMS_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: sync to S3
        # cms is just a Decap-CDN bootstrap + config.yml — static; no build.
        run: |
          aws s3 sync cms-dist/ "s3://$BUCKET/" \
            --delete \
            --exclude "package.json" \
            --exclude "node_modules/*" \
            --cache-control "public, max-age=60, must-revalidate"
      - name: CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CMS_DISTRIBUTION_ID }}" \
            --paths "/*"
      - name: tag release
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"
