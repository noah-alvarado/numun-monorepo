name: deploy api

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "infra/api/**"
      - "infra/envs/**"
      - "scripts/load-env.sh"
      - "scripts/load-stack-outputs.sh"
      - ".github/workflows/api.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to deploy to
        required: false
        default: test
        type: choice
        options: [test, prod]
      bump:
        description: Which semver component to bump
        required: false
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  id-token: write # OIDC
  contents: write # push version tags

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ENV: ${{ inputs.environment || 'test' }}
    environment:
      name: ${{ inputs.environment || 'test' }}
      # The full URL is composed in the "derive deploy role + stack name"
      # step below from the env YAML's APEX_DOMAIN, but GitHub's
      # `environment.url` is evaluated before that step runs. Hardcode
      # the two known apex shapes here so the Deployments dashboard
      # links to the right host.
      url: ${{ inputs.environment == 'prod' && 'https://api.numun.org' || 'https://api.test.numun.org' }}
    steps:
      - uses: actions/checkout@v4
      - name: load env config
        run: scripts/load-env.sh "$ENV"
      - name: derive deploy role + stack name
        run: |
          echo "DEPLOY_ROLE_API_ARN=arn:aws:iam::${AWS_ACCOUNT_ID}:role/numun-${ENV_NAME}-deploy-api" >> "$GITHUB_ENV"
          echo "STACK_NAME=numun-${ENV_NAME}-api" >> "$GITHUB_ENV"
      - name: compute version
        id: version
        uses: ./.github/actions/compute-version
        with:
          app: api
          bump: ${{ inputs.bump || 'patch' }}
          version-file: api/VERSION
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_API_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: load base-data stack outputs
        # Exports CognitoUserPoolId, CognitoUserPoolArn, CognitoClientId,
        # TableName, bucket ARNs, AlarmsTopicArn â€” all as job env vars.
        run: scripts/load-stack-outputs.sh "numun-${ENV_NAME}-base-data"
      - name: sam build
        working-directory: infra/api
        env:
          COMMIT_SHA: ${{ github.sha }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: sam build
      - name: sam deploy
        working-directory: infra/api
        run: |
          # Sentry DSN is no longer passed as a stack parameter (M14).
          # The Lambda reads it at cold-start from
          # /numun/${ENV}/sentry/dsn via observability.fetchDSNFromSSM.
          sam deploy \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --s3-bucket "$SAM_ARTIFACTS_BUCKET" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "Env=$ENV" \
              "RootDomain=$ROOT_DOMAIN" \
              "EnvSubdomain=$ENV_SUBDOMAIN" \
              "CommitSha=${{ github.sha }}" \
              "ReleaseVersion=${{ steps.version.outputs.version }}" \
              "ApiCertificateArn=$API_CERTIFICATE_ARN" \
              "HostedZoneId=$HOSTED_ZONE_ID" \
              "CognitoUserPoolId=$CognitoUserPoolId" \
              "CognitoUserPoolArn=$CognitoUserPoolArn" \
              "CognitoClientId=$CognitoClientId"
      - name: get HTTP API endpoint
        id: api
        run: |
          ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='HttpApiEndpoint'].OutputValue | [0]" \
            --output text)
          echo "endpoint=$ENDPOINT" >> "$GITHUB_OUTPUT"
          echo "API endpoint: $ENDPOINT"
      - name: smoke check
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "${{ steps.api.outputs.endpoint }}/v1/health" || true)
            echo "attempt $i â†’ $code"
            [ "$code" = "200" ] && exit 0
            sleep 2
          done
          echo "smoke check failed"
          exit 1
      - name: tag release
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"
