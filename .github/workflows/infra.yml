name: deploy infra

# Deploys the base infrastructure stacks (base-data, base-cdn, billing-alarm).
# Manual-only â€” these change rarely and shouldn't auto-deploy on every push.
#
# Updates to `infra/bootstrap/oidc-roles.yaml` are NOT covered by this
# workflow yet; they remain a break-glass step until the deploy-infra role
# itself has the IAM-self-modify permissions needed. See M14 follow-ups
# in IMPLEMENTATION_PLAN.md.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to deploy to
        required: false
        default: test
        type: choice
        options: [test, prod]
      stack:
        description: Which stack to deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - base-data
          - base-cdn
          - billing-alarm

permissions:
  id-token: write # OIDC
  contents: read

concurrency:
  group: deploy-infra
  cancel-in-progress: false

jobs:
  base-data:
    if: ${{ inputs.stack == 'all' || inputs.stack == 'base-data' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'test' }}
    env:
      ENV: ${{ inputs.environment || 'test' }}
    steps:
      - uses: actions/checkout@v4
      - name: load env config
        run: scripts/load-env.sh "$ENV"
      - name: derive deploy role + stack name
        run: |
          echo "DEPLOY_ROLE_INFRA_ARN=arn:aws:iam::${AWS_ACCOUNT_ID}:role/numun-${ENV_NAME}-deploy-infra" >> "$GITHUB_ENV"
          echo "STACK_NAME=numun-${ENV_NAME}-base-data" >> "$GITHUB_ENV"
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_INFRA_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: deploy
        working-directory: infra/base-data
        run: |
          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --template-file template.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "Env=$ENV" \
              "RootDomain=$ROOT_DOMAIN" \
              "EnvSubdomain=$ENV_SUBDOMAIN" \
              "AlarmEmail=$ALARM_EMAIL"

  base-cdn:
    if: ${{ inputs.stack == 'all' || inputs.stack == 'base-cdn' }}
    needs: [base-data]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'test' }}
    env:
      ENV: ${{ inputs.environment || 'test' }}
    steps:
      - uses: actions/checkout@v4
      - name: load env config
        run: scripts/load-env.sh "$ENV"
      - name: derive deploy role + stack name
        run: |
          echo "DEPLOY_ROLE_INFRA_ARN=arn:aws:iam::${AWS_ACCOUNT_ID}:role/numun-${ENV_NAME}-deploy-infra" >> "$GITHUB_ENV"
          echo "STACK_NAME=numun-${ENV_NAME}-base-cdn" >> "$GITHUB_ENV"
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_INFRA_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: deploy
        working-directory: infra/base-cdn
        run: |
          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --template-file template.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "Env=$ENV" \
              "RootDomain=$ROOT_DOMAIN" \
              "EnvSubdomain=$ENV_SUBDOMAIN" \
              "HostedZoneId=$HOSTED_ZONE_ID" \
              "CloudFrontCertificateArn=$CDN_CERTIFICATE_ARN"

  billing-alarm:
    if: ${{ inputs.stack == 'all' || inputs.stack == 'billing-alarm' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'test' }}
    env:
      ENV: ${{ inputs.environment || 'test' }}
      # us-east-1 is non-negotiable: CloudWatch billing metrics only exist
      # in us-east-1, so the billing alarm stack must deploy there
      # regardless of the env YAML's AWS_REGION.
      BILLING_ALARM_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - name: load env config
        run: scripts/load-env.sh "$ENV"
      - name: derive deploy role + stack name
        run: |
          echo "DEPLOY_ROLE_INFRA_ARN=arn:aws:iam::${AWS_ACCOUNT_ID}:role/numun-${ENV_NAME}-deploy-infra" >> "$GITHUB_ENV"
          echo "STACK_NAME=numun-${ENV_NAME}-billing-alarm" >> "$GITHUB_ENV"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_INFRA_ARN }}
          aws-region: ${{ env.BILLING_ALARM_REGION }}
      - name: deploy
        working-directory: infra/billing-alarm
        env:
          THRESHOLD_USD: ${{ vars.BILLING_THRESHOLD_USD || '10' }}
        run: |
          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --region "$BILLING_ALARM_REGION" \
            --template-file us-east-1.yaml \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "Env=$ENV" \
              "AlarmEmail=$ALARM_EMAIL" \
              "ThresholdUsd=$THRESHOLD_USD"
