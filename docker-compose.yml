# Local prod-mirror for NUMUN.
# See INFRASTRUCTURE.md §4 and IMPLEMENTATION_PLAN.md M0.

services:
  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    container_name: numun-ddb-local
    # -sharedDb writes to ./shared-local-instance.db in the working dir;
    # we omit -dbPath so the file lives in /home/dynamodblocal (writable by
    # the image's default user). Data is wiped on `make dev-down`.
    command: -jar DynamoDBLocal.jar -sharedDb
    ports:
      - "8000:8000"
    working_dir: /home/dynamodblocal

  ddb-init:
    image: amazon/aws-cli:2.17.0
    container_name: numun-ddb-init
    depends_on:
      dynamodb-local:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-2
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Wait for DDB Local to accept connections (it has no curl/nc; poll via aws CLI).
        for i in $$(seq 1 30); do
          if aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000 >/dev/null 2>&1; then
            break
          fi
          echo "waiting for dynamodb-local ($$i/30)..."
          sleep 1
        done
        aws dynamodb describe-table --table-name numun-test \
          --endpoint-url http://dynamodb-local:8000 >/dev/null 2>&1 && exit 0
        aws dynamodb create-table \
          --table-name numun-test \
          --endpoint-url http://dynamodb-local:8000 \
          --attribute-definitions \
            AttributeName=PK,AttributeType=S \
            AttributeName=SK,AttributeType=S \
            AttributeName=GSI1PK,AttributeType=S \
            AttributeName=GSI1SK,AttributeType=S \
            AttributeName=GSI2PK,AttributeType=S \
            AttributeName=GSI2SK,AttributeType=S \
          --key-schema \
            AttributeName=PK,KeyType=HASH \
            AttributeName=SK,KeyType=RANGE \
          --global-secondary-indexes \
            '[
              {
                "IndexName": "GSI1",
                "KeySchema": [
                  {"AttributeName":"GSI1PK","KeyType":"HASH"},
                  {"AttributeName":"GSI1SK","KeyType":"RANGE"}
                ],
                "Projection": {"ProjectionType":"KEYS_ONLY"}
              },
              {
                "IndexName": "GSI2",
                "KeySchema": [
                  {"AttributeName":"GSI2PK","KeyType":"HASH"},
                  {"AttributeName":"GSI2SK","KeyType":"RANGE"}
                ],
                "Projection": {"ProjectionType":"ALL"}
              }
            ]' \
          --billing-mode PAY_PER_REQUEST
        aws dynamodb update-time-to-live \
          --table-name numun-test \
          --endpoint-url http://dynamodb-local:8000 \
          --time-to-live-specification "Enabled=true, AttributeName=expiresAt" || true

  localstack:
    image: localstack/localstack:3.8
    container_name: numun-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,ses,sqs,sns
      AWS_DEFAULT_REGION: us-east-2
      DEBUG: 0
      PERSISTENCE: 0
    volumes:
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:4566/_localstack/health || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: numun-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
